name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Arch-Container: gleiche Qt/KF6-Versionen wie die Zielplattform (Rolling
    # Release, aktuelles Kirigami). Ubuntu-LTS-Pakete sind für Kirigami 6 zu alt.
    container: archlinux:latest
    steps:
      - name: Systempakete installieren
        run: |
          pacman -Syu --noconfirm \
            base-devel git rust clang \
            qt6-base qt6-declarative \
            kirigami kirigami-addons ki18n kiconthemes \
            qqc2-desktop-style breeze-icons \
            gettext

      - uses: actions/checkout@v5

      - name: Cargo-Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --workspace

      - name: Tests
        run: cargo test --workspace

      - name: Clippy
        # Das Arch-rust-Paket bringt clippy bereits mit.
        run: cargo clippy --workspace -- -D warnings

      - name: Übersetzungen validieren
        run: |
          for po in po/*.po; do msgfmt --check -o /dev/null "$po"; done

      - name: Desktop-Datei validieren
        run: |
          pacman -S --noconfirm desktop-file-utils appstream
          desktop-file-validate data/de.hnsstrk.vergissmeinnicht.desktop
          appstreamcli validate --no-net data/de.hnsstrk.vergissmeinnicht.metainfo.xml

      - name: i18n-Argument-Check (Flow-Test)
        # ki18n meldet fehlende %1-Argumente nur zur Laufzeit — der Flow-Test
        # macht sie im Log sichtbar (I18N_ARGUMENT_MISSING / "instead of").
        run: |
          export XDG_DATA_HOME=/tmp/vmn-flow XDG_CONFIG_HOME=/tmp/vmn-flow-cfg
          export QT_QPA_PLATFORM=offscreen QT_FORCE_STDERR_LOGGING=1
          timeout 120 ./target/debug/vergissmeinnicht --test-flow > /tmp/flow.log 2>&1 || true
          grep -q "FLOW-ENDE: alles grün" /tmp/flow.log
          if grep -E "I18N_ARGUMENT_MISSING|kf.i18n:.*instead of" /tmp/flow.log; then
            echo "::error::i18n-Argumentfehler im Flow-Log"; exit 1
          fi

      - name: Interaktionstest (synthetische Events)
        run: |
          export XDG_DATA_HOME=/tmp/vmn-input XDG_CONFIG_HOME=/tmp/vmn-input-cfg
          export QT_QPA_PLATFORM=offscreen QT_FORCE_STDERR_LOGGING=1
          cargo run -q -p vergissmeinnicht-core --example seed_demo -- /tmp/vmn-input/vergissmeinnicht/replica
          timeout 120 ./target/debug/vergissmeinnicht --test-input > /tmp/input.log 2>&1 || true
          grep -q "INPUT-ENDE: alles grün" /tmp/input.log || { cat /tmp/input.log; exit 1; }
